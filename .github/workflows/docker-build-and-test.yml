on:
  workflow_call:
    inputs:
      docker-service:
        required: true
        type: string
      from-scratch:
        required: false
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Set up Docker Buildx
        if: ${{ !inputs.from-scratch }}
        uses: docker/setup-buildx-action@v3
      - name: Set up build cache folder
        if: ${{ !inputs.from-scratch }}
        run: mkdir -p /tmp/.buildx-cache
      - name: Cache Docker layers
        if: ${{ !inputs.from-scratch }}
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Prepare docker folder
        working-directory: docker
        run: |
          touch .env
      - name: Build environment from cache
        working-directory: docker
        if: ${{ !inputs.from-scratch }}
        run: |
          docker buildx create --use --name builder || true
          docker buildx inspect --bootstrap
          docker compose build ${{ inputs.docker-service }}
      - name: Build all docker images from scratch
        working-directory: docker
        if: ${{ inputs.from-scratch }}
        run: |
          DOCKER_BUILDKIT=0 docker compose build --no-cache
      - name: Start docker containers
        working-directory: docker
        run: |
          docker compose up ${{ inputs.docker-service }}
      - name: Test with pytest
        timeout-minutes: 5
        working-directory: docker
        run: |
          docker compose run ${{ inputs.docker-service }} bash -c "pip install pytest; python -m pytest -v -s --color=yes"
          
