on:
  workflow_call:


jobs:
  build-and-test-uv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest
      - name: Build package
        run: uv build

