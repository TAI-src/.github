on:
  workflow_call:
    inputs:
      docker-service:
        required: false
        type: string
        default: ""
      lint-src:
        required: false
        type: string
        default: ""
      pretty:
        required: false
        type: boolean
        default: true
      from-scratch:
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: "3.12"


jobs:
  detect-uv:
    runs-on: ubuntu-latest
    outputs:
      is_uv: ${{ steps.detect-uv.outputs.is_uv }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect uv
        id: detect-uv
        shell: bash
        run: |
          if [[ -f "uv.lock" ]]; then
            echo "is_uv=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_uv=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test-uv:
    needs: detect-uv
    if: ${{ needs.detect-uv.outputs.is_uv == 'true' }}
    uses: TAI-src/.github/.github/workflows/uv-build-and-test.yml@main
    secrets: inherit


  build-and-test-docker:
    if: ${{ inputs.docker-service != '' }}
    uses: TAI-src/.github/.github/workflows/docker-build-and-test.yml@main
    with:
      docker-service: ${{ inputs.docker-service }}
      from-scratch: ${{ inputs.from-scratch }}
    secrets: inherit

  formatting:
    if: ${{ inputs.pretty }}
    uses: TAI-src/.github/.github/workflows/format.yml@main
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit

  linting:
    if: ${{ inputs.pretty && inputs.lint-src != '' }}
    uses: TAI-src/.github/.github/workflows/lint.yml@main
    permissions:
      contents: write
      pull-requests: write
    with:
      lint-src: ${{ inputs.lint-src }}
      python-version: ${{ inputs.python-version }}
    secrets: inherit

  status:
    if: ${{ always() }}
    needs:
      - build-and-test-uv
      - build-and-test-docker
      - formatting
      - linting
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        shell: bash
        run: |
          echo "UV: ${{ needs.build-and-test-uv.result }}"
          echo "Docker: ${{ needs.build-and-test-docker.result }}"
          echo "Formatting: ${{ needs.formatting.result }}"
          echo "Linting: ${{ needs.linting.result }}"
          echo "Pretty: ${{ inputs.pretty }}"

          build_ok=false
          if [[ "${{ needs.build-and-test-uv.result }}" == "success" ||
              "${{ needs.build-and-test-docker.result }}" == "success" ]]; then
            build_ok=true
          fi

          pretty_ok=true
          if [[ "${{ inputs.pretty }}" == "true" ]]; then
            if [[ "${{ needs.formatting.result }}" != "success" ||
                "${{ needs.linting.result }}" != "success" ]]; then
              pretty_ok=false
            fi
          fi

          if [[ "$build_ok" == "true" && "$pretty_ok" == "true" ]]; then
            echo "CI requirements fulfilled"
          else
            echo "CI requirements not fulfilled"
            exit 1
          fi
