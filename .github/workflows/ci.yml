on:
  workflow_call:
    inputs:
      docker-service:
        required: false
        type: string
        default: ""
      lint-src:
        required: false
        type: string
        default: ""
      pretty:
        required: false
        type: boolean
        default: true
      from-scratch:
        required: false
        type: boolean
        default: false
      python-version:
        required: false
        type: string
        default: "3.12"

jobs:
  detect-uv:
    runs-on: ubuntu-latest
    outputs:
      is_uv: ${{ steps.detect-uv.outputs.is_uv }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect uv
        id: detect-uv
        shell: bash
        run: |
          if [[ -f "uv.lock" ]]; then
            echo "is_uv=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_uv=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-test-uv:
    needs: detect-uv
    if: ${{ needs.detect-uv.outputs.is_uv == 'true' }}
    uses: TAI-src/.github/.github/workflows/uv-build-and-test.yml@main


  build-and-test-docker:
    if: ${{ inputs.docker-service != '' }}
    uses: TAI-src/.github/.github/workflows/docker-build-and-test.yml@main
    with:
      docker-service: ${{ inputs.docker-service }}
      from-scratch: ${{ inputs.from-scratch }}

  formatting:
    if: ${{ inputs.pretty }}
    uses: TAI-src/.github/.github/workflows/format.yml@main
    permissions:
      contents: write
      pull-requests: write

  linting:
    if: ${{ inputs.pretty && inputs.lint-src != '' }}
    uses: TAI-src/.github/.github/workflows/lint.yml@main
    permissions:
      contents: read
    with:
      lint-src: ${{ inputs.lint-src }}
      python-version: ${{ inputs.python-version }}

