on:
  workflow_call:
    inputs:
      lint-src:
        required: true
        type: string
      python-version:
        required: false
        type: string
        default: "3.12"
        
jobs:
  linting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install mypy pylint ruff
      - name: Run mypy
        run: |
          mypy --ignore-missing-imports --show-error-codes ${{ inputs.lint-src }}
      - name: Run ruff
        run: |
          ruff ${{ inputs.lint-src }}
      - name: Run pylint
        run: |
          pylint ${{ inputs.lint-src }} --disable=W0511


